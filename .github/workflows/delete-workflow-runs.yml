name: Delete Workflow Runs
run-name: Digifall / Delete Workflow Runs / ${{ github.ref_name }} / ${{ github.event_name }}

on:
  schedule:
    - cron: "0 12 * * *"

jobs:
  del_runs:
    runs-on: ubuntu-latest
    steps:
      - uses: Mattraks/delete-workflow-runs@v2
        with:
          token: ${{ github.token }}
          repository: ${{ github.repository }}
          retain_days: 7
          keep_minimum_runs: 7
