name: Pull Request Validation
run-name: Digifall / Pull Request Validation / ${{ github.ref_name }} / ${{ github.event_name }}

on:
  pull_request:
    branches:
      - main

permissions:
  contents: read

jobs:
  validate:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6
      - uses: actions/setup-node@v6
        with:
          node-version: 24
          cache: npm
      - run: npm ci
      - run: npm test
      - run: npm run check
      - run: npm run build
      - run: npm run validate-records -- nodes/leaderboard/data.json
      - run: node android/compute-version-code.mjs
      - run: node android/generate-release-notes.mjs
      - run: node android/sync-twa-version.mjs
